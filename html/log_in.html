<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחר משחק</title>
    <link rel="stylesheet" href="../css/openPage.css">
</head>

<body>
    <h1 style="text-align: center; margin-bottom: 20px;">Log In</h1>

    <form class="registration-form" id="registrationForm">
        <label for="username">שם משתמש:</label><br>
        <input type="text" id="username" name="username" placeholder="הכנס שם משתמש" required><br><br>

        <label for="password">סיסמה:</label><br>
        <input type="password" id="password" name="password" placeholder="הכנס סיסמה" required><br><br>

        <button type="submit">התחבר</button><br><br>

        <a href="../html/sign_up.html">Sign Up</a>
    </form>

    <script src="../js/log_in.js" defer></script>
</body>

</html>
