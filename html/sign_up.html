 <!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחר משחק</title>
    <link rel="stylesheet" href="../css/openPage.css">
</head>

<body>
    <h1 style="text-align: center; margin-bottom: 20px;">Sign Up</h1>

    <form class="registration-form" id="registrationForm">
        <label for="username">שם משתמש:</label>
        <input type="text" id="username" name="username" placeholder="הכנס שם משתמש" required>

        <label for="password">סיסמה:</label>
        <input type="password" id="password" name="password" placeholder="הכנס סיסמה" required>

        <label for="confirmPassword">אמת סיסמא:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="אמת סיסמה" required>

        <button type="submit">הירשם</button>

        <a href="../html/log_in.html">log in</a>
    </form>

    <script src="../js/sign_up.js" defer></script>
</body>

</html>
